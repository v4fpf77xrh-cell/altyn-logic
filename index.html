<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALTYN LOGIC | Твой путь к 140 баллам</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Header -->
    <header class="p-6 flex justify-between items-center bg-white shadow-sm">
        <h1 class="text-2xl font-bold text-indigo-600">ALTYN LOGIC</h1>
        <button class="bg-indigo-600 text-white px-6 py-2 rounded-full hover:bg-indigo-700 transition">Войти</button>
    </header>

    <main id="main-content" class="max-w-6xl mx-auto mt-12 px-6 grid grid-cols-1 md:grid-cols-2 gap-12">
        
        <!-- Left Side: Action -->
        <div class="flex flex-col justify-center">
            <h2 class="text-4xl font-extrabold leading-tight">
                Твой личный тренер к <span class="text-indigo-600">140 баллам</span>
            </h2>
            <p class="mt-4 text-gray-600 text-lg">
                Умная аналитика, ELO-рейтинг и лайфхаки, которых не дают в школе. Узнай свой уровень за 5 минут.
            </p>
            <div class="mt-8">
                <!-- ДОБАВИЛИ id="start-btn" ТУТ -->
                <button id="start-btn" class="bg-indigo-600 text-white text-xl px-10 py-4 rounded-xl shadow-lg hover:transform hover:scale-105 transition">
                    Начать Блиц-тест
                </button>
            </div>
        </div>

        <!-- Right Side: Leaderboard -->
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <h3 class="text-xl font-bold mb-6 flex items-center">
                🏆 Топ героев недели
            </h3>
            <div class="space-y-4">
                <div class="flex justify-between items-center p-3 bg-indigo-50 rounded-lg">
                    <span class="font-medium">1. Арман (Алматы)</span>
                    <span class="font-bold text-indigo-600">2450 ELO</span>
                </div>
                <div class="flex justify-between items-center p-3">
                    <span class="font-medium text-gray-700">2. Диана (Астана)</span>
                    <span class="font-bold text-gray-500">2320 ELO</span>
                </div>
                <div class="flex justify-between items-center p-3 text-gray-700">
                    <span class="font-medium">3. Берик (Шымкент)</span>
                    <span class="font-bold text-gray-500">2100 ELO</span>
                </div>
            </div>
            <p class="mt-6 text-center text-sm text-gray-400">
                Пройди тест, чтобы попасть в рейтинг
            </p>
        </div>

    </main>

    <!-- СКРИПТ ЛОГИКИ ТЕСТА -->
    <script>
    const startBtn = document.getElementById('start-btn');
    const mainContent = document.getElementById('main-content');
    
    let currentStep = 0;
    let score = 0;

    const questions = [
        {
            q: "Найдите 20% от числа 450.",
            options: ["A) 45", "B) 90", "C) 100", "D) 200"],
            correct: 1,
            hint: "Лайфхак: 10% это 45. Умножаем на 2 и получаем 90."
        },
        {
            q: "Если 3 блокнота стоят 600 тенге, сколько стоят 5 таких блокнотов?",
            options: ["A) 800 тг", "B) 900 тг", "C) 1000 тг", "D) 1200 тг"],
            correct: 2,
            hint: "Лайфхак: Сначала найди цену одного (600 / 3 = 200), потом умножь на 5."
        }
    ];

    startBtn.addEventListener('click', showQuestion);

    function showQuestion() {
        const item = questions[currentStep];
        mainContent.innerHTML = `
            <div class="col-span-1 md:col-span-2 bg-white p-10 rounded-3xl shadow-xl border border-gray-100">
                <h2 class="text-2xl font-bold mb-6 text-indigo-600">Вопрос ${currentStep + 1} из ${questions.length}</h2>
                <p class="text-xl mb-8 font-medium">${item.q}</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${item.options.map((opt, index) => `
                        <button onclick="checkAnswer(${index})" class="p-5 border-2 border-gray-100 rounded-2xl hover:border-indigo-600 hover:bg-indigo-50 transition text-lg text-left">${opt}</button>
                    `).join('')}
                </div>
                <div id="feedback" class="mt-8 hidden p-6 rounded-2xl"></div>
                <button id="next-btn" class="hidden mt-6 bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold">Дальше →</button>
            </div>
        `;
    }

    function checkAnswer(selectedIndex) {
        const item = questions[currentStep];
        const feedback = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');
        
        feedback.classList.remove('hidden');
        nextBtn.classList.remove('hidden');

        if (selectedIndex === item.correct) {
            score++;
            feedback.innerHTML = `<p class="font-bold">✅ Правильно! ${item.hint}</p>`;
            feedback.className = "mt-8 p-6 rounded-2xl bg-green-100 text-green-800 border border-green-200";
        } else {
            feedback.innerHTML = `<p class="font-bold">❌ Ошибка. ${item.hint}</p>`;
            feedback.className = "mt-8 p-6 rounded-2xl bg-red-100 text-red-800 border border-red-200";
        }

        nextBtn.onclick = () => {
            currentStep++;
            if (currentStep < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        };
    }

    function showResult() {
        mainContent.innerHTML = `
            <div class="col-span-1 md:col-span-2 text-center bg-white p-12 rounded-3xl shadow-2xl">
                <h2 class="text-4xl font-black mb-4">Твой результат: ${score} из ${questions.length}</h2>
                <p class="text-xl text-gray-600 mb-8">Твой текущий уровень ELO: <span class="text-indigo-600 font-bold">${1000 + (score * 50)}</span></p>
                <div class="bg-indigo-50 p-6 rounded-2xl mb-8">
                    <p class="text-lg italic text-indigo-900">"Хочешь разобрать все темы ЕНТ с такими же лайфхаками и ИИ-куратором?"</p>
                </div>
                <button class="bg-green-500 text-white text-2xl px-12 py-5 rounded-2xl font-bold shadow-xl hover:bg-green-600 transition">
                    🔥 Получить полный доступ (2000 тг)
                </button>
            </div>
        `;
    }
</script>

</body>
</html>
