<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altyn Logic | Admin & Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .neo-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; transition: all 0.3s; }
        .gradient-blue { background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
        .hidden { display: none; }
    </style>
</head>
<body class="antialiased" onload="initApp()">

    <nav class="glass sticky top-0 z-[100] h-20 flex items-center px-6 justify-between">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="router.navigate('hero')">
            <div class="w-10 h-10 gradient-blue rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-lock"></i></div>
            <span class="text-xl font-extrabold italic">ALTYN LOGIC</span>
        </div>
        <div class="flex items-center space-x-4">
            <!-- КНОПКА АДМИНА (Скрытая) -->
            <button onclick="router.navigate('admin')" class="text-slate-300 hover:text-blue-600"><i class="fas fa-cog"></i></button>
            <div id="nav-user-area"></div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        
        <!-- SECTION: HERO -->
        <section id="sec-hero" class="app-section space-y-10 py-10">
            <div class="text-center space-y-4">
                <h1 class="text-5xl font-black italic">УПРАВЛЕНИЕ КОНТЕНТОМ</h1>
                <p class="text-slate-400">Добавляй новые вопросы в облако в реальном времени.</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div onclick="quiz.init()" class="neo-card p-8 cursor-pointer hover:border-blue-500">
                    <h3 class="text-xl font-bold italic uppercase">Запустить Тест</h3>
                    <p class="text-slate-400 text-sm">Проверь новые вопросы.</p>
                </div>
                <div onclick="router.navigate('admin')" class="neo-card p-8 cursor-pointer hover:border-purple-500">
                    <h3 class="text-xl font-bold italic uppercase">База Данных</h3>
                    <p class="text-slate-400 text-sm">Управление вопросами.</p>
                </div>
            </div>
        </section>

        <!-- SECTION: ADMIN PANEL -->
        <section id="sec-admin" class="app-section hidden space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-3xl font-black italic underline decoration-blue-500">ADMIN PANEL</h2>
                <button onclick="router.navigate('hero')" class="text-xs font-bold uppercase text-slate-400">Закрыть</button>
            </div>

            <div class="neo-card p-10 space-y-6 shadow-2xl border-2 border-blue-50">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Предмет</label>
                        <select id="adm-subject" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-blue-100 font-bold">
                            <option value="math_lit">Мат. грамотность</option>
                            <option value="history">История Казахстана</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Язык</label>
                        <select id="adm-lang" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-blue-100 font-bold">
                            <option value="ru">Русский</option>
                            <option value="kk">Қазақ тілі</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Текст вопроса</label>
                    <textarea id="adm-q-text" class="w-full p-6 bg-slate-50 rounded-3xl outline-none focus:ring-2 ring-blue-100 font-medium" rows="3"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="adm-opt-0" placeholder="Вариант А" class="p-4 bg-slate-50 rounded-2xl outline-none">
                    <input type="text" id="adm-opt-1" placeholder="Вариант B" class="p-4 bg-slate-50 rounded-2xl outline-none">
                    <input type="text" id="adm-opt-2" placeholder="Вариант C" class="p-4 bg-slate-50 rounded-2xl outline-none">
                    <input type="text" id="adm-opt-3" placeholder="Вариант D" class="p-4 bg-slate-50 rounded-2xl outline-none">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Верный индекс (0-3)</label>
                        <input type="number" id="adm-correct" min="0" max="3" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                    </div>
                    <div class="flex items-end">
                        <label class="flex items-center space-x-3 cursor-pointer bg-slate-50 p-4 rounded-2xl w-full">
                            <input type="checkbox" id="adm-is-pro" class="w-5 h-5 rounded border-none text-blue-600">
                            <span class="text-xs font-black uppercase italic">PRO Вопрос</span>
                        </label>
                    </div>
                </div>

                <button onclick="admin.saveQuestion()" class="w-full p-6 gradient-blue text-white rounded-3xl font-black italic uppercase tracking-widest shadow-xl hover:scale-[1.02] transition">Сохранить в облако</button>
            </div>
        </section>

        <!-- SECTION: QUIZ -->
        <section id="sec-quiz" class="app-section hidden">
            <!-- Код квиза из прошлых версий -->
            <div id="quiz-container" class="neo-card p-10 text-center space-y-10">
                <h2 id="q-text" class="text-2xl font-bold italic">Загрузка вопросов...</h2>
                <div id="q-options" class="grid grid-cols-1 gap-4"></div>
            </div>
        </section>

    </main>

    <script>
        const SUPABASE_URL = 'https://ixjowqkwcgkksatgkmqd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JGImt2KS6mStnbnAcJcEPg_8qbal1zc';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const router = {
            navigate: (sec) => {
                document.querySelectorAll('.app-section').forEach(s => s.classList.add('hidden'));
                document.getElementById(`sec-${sec}`).classList.remove('hidden');
            }
        };

        const admin = {
            saveQuestion: async () => {
                const qData = {
                    subject: document.getElementById('adm-subject').value,
                    lang: document.getElementById('adm-lang').value,
                    question_text: document.getElementById('adm-q-text').value,
                    options: [
                        document.getElementById('adm-opt-0').value,
                        document.getElementById('adm-opt-1').value,
                        document.getElementById('adm-opt-2').value,
                        document.getElementById('adm-opt-3').value
                    ],
                    correct_idx: parseInt(document.getElementById('adm-correct').value),
                    is_pro: document.getElementById('adm-is-pro').checked
                };

                const { error } = await sbClient.from('questions').insert([qData]);
                
                if (error) {
                    alert("Ошибка: " + error.message);
                } else {
                    alert("Вопрос успешно добавлен в облако!");
                    // Очистка полей
                    document.getElementById('adm-q-text').value = '';
                    [0,1,2,3].forEach(i => document.getElementById(`adm-opt-${i}`).value = '');
                }
            }
        };

        const quiz = {
            init: async () => {
                router.navigate('quiz');
                // Загружаем вопросы из Supabase вместо статического файла
                const { data, error } = await sbClient.from('questions').select('*');
                if (data && data.length > 0) {
                    quiz.render(data[0]);
                } else {
                    document.getElementById('q-text').innerText = "В базе пока нет вопросов. Добавь их через Admin Panel!";
                }
            },
            render: (q) => {
                document.getElementById('q-text').innerText = q.question_text;
                const opts = document.getElementById('q-options');
                opts.innerHTML = '';
                q.options.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = "p-6 neo-card font-bold hover:bg-blue-50 transition";
                    btn.innerText = opt;
                    opts.appendChild(btn);
                });
            }
        };

        function initApp() {
            console.log("Altyn Logic Admin Engine Ready");
        }
    </script>
</body>
</html>
