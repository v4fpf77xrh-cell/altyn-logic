<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altyn Logic | Titan Admin Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --accent: #2563eb; --glass: rgba(255, 255, 255, 0.85); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; scroll-behavior: smooth; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .neo-card { background: white; border-radius: 32px; border: 1px solid #e2e8f0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .neo-card:hover { transform: translateY(-8px); box-shadow: 0 40px 80px -15px rgba(37, 99, 235, 0.1); border-color: var(--accent); }
        .btn-action { border-radius: 20px; font-weight: 800; transition: all 0.3s; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; }
        .gradient-blue { background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); }
        .hidden { display: none; }
        #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1000; }
        .toast { background: #1e293b; color: white; padding: 16px 24px; border-radius: 16px; margin-top: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="antialiased" onload="initApp()">

    <div id="toast-container"></div>

    <nav class="glass sticky top-0 z-[100]">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="router.navigate('hero')">
                <div class="w-10 h-10 gradient-blue rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-crown"></i></div>
                <span class="text-2xl font-extrabold tracking-tighter italic">ALTYN LOGIC</span>
            </div>
            
            <div class="hidden lg:flex items-center space-x-8 text-[10px] font-black uppercase tracking-widest text-slate-400">
                <button onclick="openModal('subjects-modal')" data-i18n="nav_subjects">Предметы</button>
                <button onclick="academy.open()" data-i18n="nav_academy">Академия</button>
                <button onclick="ui.checkPaywall('battle')" class="text-orange-500" data-i18n="nav_battle"><i class="fas fa-fire mr-1"></i> Баттл</button>
                
                <div class="flex bg-slate-100 rounded-full p-1 ml-4">
                    <button onclick="ui.setLang('ru')" id="lang-ru" class="px-3 py-1 rounded-full text-[9px] font-bold transition-all">RU</button>
                    <button onclick="ui.setLang('kk')" id="lang-kk" class="px-3 py-1 rounded-full text-[9px] font-bold transition-all">KK</button>
                </div>
            </div>

            <div class="flex items-center space-x-4" id="nav-user-area"></div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        
        <!-- SECTION: HERO -->
        <section id="sec-hero" class="app-section space-y-20">
            <div class="text-center space-y-8 py-10 animate-up">
                <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter leading-[0.85] italic uppercase" data-i18n="hero_title">Cloud <br><span class="text-blue-600">Education.</span></h1>
                <p class="text-slate-400 text-xl max-w-2xl mx-auto font-medium italic" data-i18n="hero_subtitle">Твой путь к гранту.</p>
                <div class="flex flex-col sm:flex-row justify-center gap-4 pt-6">
                    <button onclick="quiz.init()" class="btn-action gradient-blue text-white px-12 py-6 text-sm shadow-2xl" data-i18n="btn_start">Начать Блиц</button>
                    <button onclick="openModal('payment-modal')" class="btn-action bg-white text-slate-900 border-2 border-slate-100 px-12 py-6 text-sm" data-i18n="btn_pro">PRO Аналитика</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div onclick="academy.open()" class="neo-card p-10 cursor-pointer"><h3 class="text-2xl font-bold uppercase italic" data-i18n="card_academy_title">Академия</h3><p class="text-slate-400 text-sm italic" data-i18n="card_academy_desc">Лайфхаки.</p></div>
                <div class="neo-card p-10 bg-blue-50/50 border-blue-100"><h3 class="text-2xl font-bold uppercase italic text-blue-900" data-i18n="card_ai_title">AI Анализ</h3><p class="text-blue-600/60 text-sm italic" id="hero-prediction">...</p></div>
                <div onclick="ui.checkPaywall('battle')" class="neo-card p-10 cursor-pointer"><h3 class="text-2xl font-bold uppercase italic" data-i18n="card_battle_title">Battle</h3><p class="text-slate-400 text-sm italic">ELO баттлы.</p></div>
            </div>
        </section>

        <!-- SECTION: PROFILE -->
        <section id="sec-profile" class="app-section hidden space-y-12">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-4 space-y-6">
                    <div class="neo-card p-10 text-center space-y-8 relative border-t-8 border-blue-600">
                        <div class="w-32 h-32 gradient-blue text-white rounded-[40px] mx-auto flex items-center justify-center text-5xl font-black" id="p-avatar">?</div>
                        <h2 class="text-3xl font-black italic" id="p-name">...</h2>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-50 p-6 rounded-3xl"><p class="text-[9px] font-black text-slate-400 mb-1 uppercase">ELO</p><p class="text-3xl font-black text-blue-600 italic" id="p-elo">0</p></div>
                            <div class="bg-slate-50 p-6 rounded-3xl"><p class="text-[9px] font-black text-slate-400 mb-1 uppercase">Streak</p><p class="text-3xl font-black text-orange-500 italic" id="p-streak">0</p></div>
                        </div>
                        <div class="space-y-3 pt-4" id="profile-actions">
                            <!-- Сюда добавится кнопка админа только для Алибека -->
                            <button onclick="auth.logout()" class="w-full text-slate-300 font-black text-[10px] uppercase italic tracking-widest hover:text-red-500 transition">Выйти</button>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-8 space-y-8">
                    <div class="neo-card p-10">
                        <h3 class="text-xs font-black text-slate-900 uppercase italic mb-8" data-i18n="profile_matrix">Матрица навыков</h3>
                        <div class="h-80"><canvas id="statsChart"></canvas></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECTION: ADMIN PANEL -->
        <section id="sec-admin" class="app-section hidden space-y-8 animate-up">
            <div class="flex justify-between items-center">
                <h2 class="text-3xl font-black italic underline decoration-blue-500">ADMIN CONTROL</h2>
                <button onclick="router.navigate('hero')" class="text-[10px] font-black uppercase text-slate-400 italic">Назад</button>
            </div>
            <div class="neo-card p-10 space-y-6 border-2 border-blue-50">
                <div class="grid grid-cols-2 gap-4">
                    <select id="adm-subject" class="p-4 bg-slate-50 rounded-2xl font-bold"><option value="math_lit">Мат. грамотность</option><option value="history">История</option></select>
                    <select id="adm-lang" class="p-4 bg-slate-50 rounded-2xl font-bold"><option value="ru">Русский</option><option value="kk">Қазақ тілі</option></select>
                </div>
                <textarea id="adm-q-text" placeholder="Текст вопроса" class="w-full p-6 bg-slate-50 rounded-3xl outline-none" rows="3"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="adm-opt-0" placeholder="A" class="p-4 bg-slate-50 rounded-2xl"><input type="text" id="adm-opt-1" placeholder="B" class="p-4 bg-slate-50 rounded-2xl">
                    <input type="text" id="adm-opt-2" placeholder="C" class="p-4 bg-slate-50 rounded-2xl"><input type="text" id="adm-opt-3" placeholder="D" class="p-4 bg-slate-50 rounded-2xl">
                </div>
                <input type="number" id="adm-correct" placeholder="Верный индекс (0-3)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold">
                <button onclick="admin.saveQuestion()" class="w-full p-6 gradient-blue text-white rounded-3xl font-black uppercase italic shadow-xl hover:scale-105 transition">Сохранить в облако</button>
            </div>
        </section>

        <!-- SECTION: QUIZ -->
        <section id="sec-quiz" class="app-section hidden space-y-12 text-center">
            <div class="flex justify-between items-end mb-10"><h2 id="q-number" class="text-5xl font-black italic">Вопрос 01</h2><div id="q-timer" class="text-3xl font-black text-slate-200 italic font-mono">00:00</div></div>
            <div class="bg-white p-16 rounded-[64px] shadow-2xl border border-slate-50"><h2 id="q-text" class="text-3xl font-bold text-slate-800 mb-16 italic"></h2><div id="q-options" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div></div>
        </section>

    </main>

    <!-- AUTH MODAL -->
    <div id="modal-bg" class="fixed inset-0 bg-slate-900/90 backdrop-blur-2xl z-[200] hidden flex items-center justify-center p-4">
        <div id="auth-modal" class="modal-content hidden bg-white w-full max-w-md rounded-[56px] p-12 space-y-8 text-center">
            <div class="flex justify-center space-x-10 border-b border-slate-100 pb-4 mb-4">
                <button onclick="auth.setMode('login')" id="tab-login" class="font-black text-sm uppercase italic">Вход</button>
                <button onclick="auth.setMode('reg')" id="tab-reg" class="font-black text-sm uppercase italic text-slate-300">Регистрация</button>
            </div>
            <div class="space-y-4">
                <div id="reg-name-field" style="display:none"><input type="text" id="in-name" placeholder="ТВОЕ ИМЯ" class="w-full p-6 bg-slate-50 rounded-3xl font-black text-xs"></div>
                <input type="email" id="in-email" placeholder="E-MAIL" class="w-full p-6 bg-slate-50 rounded-3xl font-black text-xs">
                <input type="password" id="in-pass" placeholder="ПАРОЛЬ" class="w-full p-6 bg-slate-50 rounded-3xl font-black text-xs">
                <button onclick="auth.process()" class="w-full btn-action gradient-blue text-white py-6 text-xs italic shadow-xl">Подтвердить</button>
            </div>
        </div>
    </div>

    <script>
        // *** ФИНАЛЬНАЯ КОНФИГУРАЦИЯ АДМИНИСТРАТОРА ***
        const ADMIN_EMAILS = ['khamidullinalibek90@gmail.com', 'alibek90@mail.ru'];

        const i18n = {
            ru: { nav_subjects: "Предметы", nav_academy: "Академия", nav_battle: "Баттл", hero_title: "Cloud <br><span class='text-blue-600'>Education.</span>", hero_subtitle: "Твой прогресс в облаке.", btn_start: "Начать Блиц", btn_pro: "PRO Аналитика", card_academy_title: "Академия", card_ai_title: "AI Анализ", card_battle_title: "Battle", profile_matrix: "Матрица навыков", adm_btn: "Управление контентом" },
            kk: { nav_subjects: "Пәндер", nav_academy: "Академия", nav_battle: "Баттл", hero_title: "Cloud <br><span class='text-blue-600'>Education.</span>", hero_subtitle: "Сенің прогресің бұлтта.", btn_start: "Блиц бастау", btn_pro: "PRO Аналитика", card_academy_title: "Академия", card_ai_title: "AI Талдау", card_battle_title: "Battle", profile_matrix: "Дағдылар матрицасы", adm_btn: "Контентті басқару" }
        };

        const SUPABASE_URL = 'https://ixjowqkwcgkksatgkmqd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JGImt2KS6mStnbnAcJcEPg_8qbal1zc';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let appState = {
            lang: localStorage.getItem('lang') || 'ru',
            user: { id: null, email: "", name: "Гость", elo: 1200, streak: 0, status: "FREE", weakPoints: [], isLoggedIn: false }
        };

        const router = {
            navigate: (sec) => {
                document.querySelectorAll('.app-section').forEach(s => s.classList.add('hidden'));
                document.getElementById(`sec-${sec}`).classList.remove('hidden');
                if(sec === 'profile') setTimeout(initChart, 100);
            }
        };

        const ui = {
            setLang: (l) => { appState.lang = l; localStorage.setItem('lang', l); ui.updateTranslations(); ui.update(); },
            updateTranslations: () => {
                const d = i18n[appState.lang];
                document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (d[k]) el.innerHTML = d[k]; });
                document.getElementById('lang-ru').className = appState.lang === 'ru' ? 'px-3 py-1 rounded-full bg-white shadow-sm text-blue-600 font-bold' : 'px-3 py-1 rounded-full text-slate-400';
                document.getElementById('lang-kk').className = appState.lang === 'kk' ? 'px-3 py-1 rounded-full bg-white shadow-sm text-blue-600 font-bold' : 'px-3 py-1 rounded-full text-slate-400';
            },
            update: () => {
                const u = appState.user;
                const area = document.getElementById('nav-user-area');
                if(u.isLoggedIn) {
                    area.innerHTML = `<button onclick="router.navigate('profile')" class="bg-slate-900 text-white px-6 py-2 rounded-full text-xs font-black uppercase italic shadow-md">${u.name}</button>`;
                    document.getElementById('p-name').innerText = u.name;
                    document.getElementById('p-avatar').innerText = u.name[0].toUpperCase();
                    document.getElementById('p-elo').innerText = u.elo;
                    document.getElementById('p-streak').innerText = u.streak;
                    
                    // ПРОВЕРКА ПРАВ: Кнопка админа появляется только для твоих почт
                    const actions = document.getElementById('profile-actions');
                    if(ADMIN_EMAILS.includes(u.email) && !document.getElementById('btn-admin-access')) {
                        const btn = document.createElement('button');
                        btn.id = 'btn-admin-access';
                        btn.className = "w-full p-4 bg-blue-50 text-blue-600 rounded-2xl font-black text-[10px] uppercase italic tracking-widest mb-2 hover:bg-blue-100 transition";
                        btn.innerText = i18n[appState.lang].adm_btn;
                        btn.onclick = () => router.navigate('admin');
                        actions.prepend(btn);
                    }
                } else {
                    area.innerHTML = `<button onclick="openModal('auth-modal')" class="bg-slate-900 text-white px-8 py-3 rounded-full text-xs font-black uppercase">Вход</button>`;
                }
            }
        };

        const db = {
            syncDown: async (userId) => {
                const { data } = await sbClient.from('profiles').select('*').eq('id', userId).single();
                if(data) { appState.user = { ...appState.user, ...data, isLoggedIn: true }; ui.update(); }
            }
        };

        const auth = {
            mode: 'login',
            setMode: (m) => {
                auth.mode = m;
                document.getElementById('tab-login').className = (m === 'login') ? 'font-black text-blue-600 border-b-2 border-blue-600' : 'text-slate-300';
                document.getElementById('tab-reg').className = (m === 'reg') ? 'font-black text-blue-600 border-b-2 border-blue-600' : 'text-slate-300';
                document.getElementById('reg-name-field').style.display = (m === 'reg') ? 'block' : 'none';
            },
            process: async () => {
                const e = document.getElementById('in-email').value;
                const p = document.getElementById('in-pass').value;
                const n = document.getElementById('in-name').value;
                let res = auth.mode === 'reg' ? await sbClient.auth.signUp({ email: e, password: p }) : await sbClient.auth.signInWithPassword({ email: e, password: p });
                if(res.error) return alert(res.error.message);
                if(res.data.user) {
                    appState.user.id = res.data.user.id;
                    appState.user.email = res.data.user.email;
                    appState.user.name = n || e.split('@')[0];
                    appState.user.isLoggedIn = true;
                    ui.update(); closeAllModals();
                }
            },
            logout: async () => { await sbClient.auth.signOut(); location.reload(); }
        };

        const admin = {
            saveQuestion: async () => {
                const qData = {
                    subject: document.getElementById('adm-subject').value,
                    lang: document.getElementById('adm-lang').value,
                    question_text: document.getElementById('adm-q-text').value,
                    options: [document.getElementById('adm-opt-0').value, document.getElementById('adm-opt-1').value, document.getElementById('adm-opt-2').value, document.getElementById('adm-opt-3').value],
                    correct_idx: parseInt(document.getElementById('adm-correct').value)
                };
                const { error } = await sbClient.from('questions').insert([qData]);
                if (error) alert("Error: " + error.message);
                else { alert("Saved to Cloud!"); document.getElementById('adm-q-text').value = ''; }
            }
        };

        const quiz = {
            init: async () => {
                router.navigate('quiz');
                const { data } = await sbClient.from('questions').select('*').eq('lang', appState.lang);
                if (data && data.length > 0) quiz.render(data[0]);
                else document.getElementById('q-text').innerText = "Добавьте вопросы в Admin Panel!";
            },
            render: (q) => {
                document.getElementById('q-text').innerText = q.question_text;
                const opts = document.getElementById('q-options'); opts.innerHTML = '';
                q.options.forEach((opt, i) => {
                    const btn = document.createElement('button'); btn.className = "p-8 neo-card font-bold text-xl hover:bg-blue-50 transition"; btn.innerText = opt;
                    opts.appendChild(btn);
                });
            }
        };

        function initChart() {
            const ctx = document.getElementById('statsChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, { type: 'radar', data: { labels: appState.lang === 'ru' ? ['Мат.Грам', 'История', 'Грам.Чтения', 'Проф.Мат', 'Проф.Физ'] : ['Мат.сауат', 'Тарих', 'Оқу сауат.', 'Проф.Мат', 'Проф.Физ'], datasets: [{ data: [85, 45, 65, 90, 75], backgroundColor: 'rgba(37, 99, 235, 0.15)', borderColor: '#2563eb', borderWidth: 4 }] }, options: { scales: { r: { beginAtZero: true, max: 100, ticks: { display: false } } }, plugins: { legend: { display: false } } } });
        }

        function openModal(id) { document.getElementById('modal-bg').classList.remove('hidden'); document.getElementById(id).classList.remove('hidden'); }
        function closeAllModals() { document.getElementById('modal-bg').classList.add('hidden'); }
        async function initApp() { 
            ui.updateTranslations();
            const { data: { session } } = await sbClient.auth.getSession(); 
            if(session) await db.syncDown(session.user.id); 
            ui.update(); 
        }
    </script>
</body>
</html>
