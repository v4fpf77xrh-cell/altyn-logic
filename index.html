<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Altyn Logic — ENT Preparation Platform</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js" crossorigin="anonymous"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      svg: { fontCache: 'global' },
      startup: { typeset: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script src="questions.js"></script>

  <style>
    :root {
      --gold: #F5C542; --gold-lt: #FFE08A; --indigo: #4F46E5; --cyan: #06B6D4;
      --bg: #0B0F1A; --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.10);
      --text: #E8ECFA; --muted: #6B7280; --danger: #EF4444; --success: #10B981;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 50% at 20% 10%, rgba(79,70,229,.18) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,.12) 0%, transparent 60%);
      pointer-events: none;
    }
    body > * { position: relative; z-index: 1; }
    .glass { background: var(--surface); backdrop-filter: blur(18px); border: 1px solid var(--border); border-radius: 16px; }
    .glass-strong { background: rgba(255,255,255,0.08); backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; }
    .text-gold-grad { background: linear-gradient(135deg, var(--gold), var(--gold-lt)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-gold { background: linear-gradient(135deg, #D4A017, var(--gold)); color: #1a1200; font-weight: 700; border-radius: 12px; padding: .65rem 1.4rem; cursor: pointer; transition: all .15s; border: none; }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,197,66,.35); }
    .btn-outline { background: transparent; color: var(--gold); border: 1.5px solid var(--gold); border-radius: 12px; padding: .6rem 1.3rem; cursor: pointer; font-weight: 600; transition: all .2s; }
    .btn-outline:hover { background: var(--gold); color: #1a1200; }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: .55rem 1.1rem; cursor: pointer; transition: all .2s; }
    .modal-backdrop { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.65); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; padding: 1rem; }
    .modal-backdrop.active { display: flex; }
    .modal-box { width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; position: relative; background: #161B2E; border: 1px solid var(--border); border-radius: 24px; padding: 2rem; }
    .modal-close { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,.08); color: var(--text); width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; border: none; }
    .inp { background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: .7rem 1rem; width: 100%; outline: none; }
    .inp:focus { border-color: var(--gold); }
    .nav-link { color: var(--muted); font-size: .9rem; font-weight: 500; padding: .4rem .7rem; border-radius: 8px; cursor: pointer; transition: all .2s; border: none; background: none; }
    .nav-link:hover, .nav-link.active { color: var(--gold); background: rgba(245,197,66,.08); }
    .option-btn { width: 100%; background: rgba(255,255,255,.04); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); padding: .85rem 1.2rem; text-align: left; cursor: pointer; transition: all .2s; margin-bottom: 0.75rem; }
    .option-btn:hover:not(:disabled) { border-color: var(--gold); transform: translateX(4px); }
    .option-btn.correct { border-color: var(--success); background: rgba(16,185,129,.12); }
    .option-btn.wrong { border-color: var(--danger); background: rgba(239,68,68,.12); }
    .progress-bar { height: 6px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--indigo), var(--gold)); transition: width .4s ease; }
    .elo-badge { background: linear-gradient(135deg, #1a1200, #2d2000); border: 1px solid var(--gold); border-radius: 20px; padding: .25rem .75rem; font-size: .8rem; color: var(--gold); font-weight: 700; }
    .subj-card { border-radius: 14px; padding: 1.2rem 1rem; cursor: pointer; border: 1.5px solid var(--border); transition: all .2s; background: rgba(255,255,255,.04); text-align: center; }
    .subj-card:hover { transform: translateY(-4px); border-color: var(--gold); }
    #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: #1E293B; border: 1px solid var(--border); border-radius: 14px; padding: .75rem 1.4rem; z-index: 2000; transition: transform .3s ease; color: white; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(245,197,66,.2); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="toast"></div>

<nav class="px-4 py-3">
  <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
    <div class="flex items-center gap-2 cursor-pointer" onclick="showSection('home')">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#D4A017,#F5C542)">
        <i class="fas fa-star text-sm" style="color:#1a1200"></i>
      </div>
      <span class="font-extrabold text-lg tracking-tight text-gold-grad">Altyn Logic</span>
    </div>
    <div class="hidden lg:flex items-center gap-1">
      <button class="nav-link" id="nav-home" onclick="showSection('home')" data-i18n="nav_home">Главная</button>
      <button class="nav-link" id="nav-quiz" onclick="showSection('quiz')" data-i18n="nav_quiz">Тест</button>
      <button class="nav-link" id="nav-stats" onclick="showSection('stats')" data-i18n="nav_stats">Статистика</button>
      <button class="nav-link" id="nav-leaderboard" onclick="showSection('leaderboard')" data-i18n="nav_lb">Рейтинг</button>
      <button class="nav-link" id="nav-admin" onclick="showSection('admin')" style="display:none" data-i18n="nav_admin">Admin</button>
    </div>
    <div class="flex items-center gap-2">
      <button class="btn-ghost text-xs font-bold px-3 py-1" onclick="toggleLang()" id="lang-toggle">KK</button>
      <div id="auth-area"></div>
    </div>
  </div>
</nav>

<main class="max-w-6xl mx-auto px-4 py-6">

  <section id="sec-home">
    <div class="glass-strong p-8 mb-6 text-center">
      <h1 class="text-4xl sm:text-5xl font-black mb-3 text-gold-grad">Altyn Logic</h1>
      <p class="text-lg mb-6 max-w-xl mx-auto" style="color:var(--muted)" data-i18n="hero_sub">Интерактивные тесты и аналитика ҰБТ 2026</p>
      <div class="flex flex-wrap gap-3 justify-center">
        <button class="btn-gold" onclick="openSubjectsModal()" data-i18n="hero_start">Начать тест</button>
        <button class="btn-outline" onclick="openModal('modal-academy')" data-i18n="hero_academy">Академия</button>
      </div>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
      <div class="glass p-4 text-center">
        <div class="text-2xl font-black text-gold-grad" id="stat-questions">0</div>
        <div class="text-xs mt-1" style="color:var(--muted)" data-i18n="stat_q">Вопросов</div>
      </div>
      <div class="glass p-4 text-center">
        <div class="text-2xl font-black" style="color:var(--success)" id="stat-elo">800</div>
        <div class="text-xs mt-1" style="color:var(--muted)" data-i18n="stat_elo">ELO</div>
      </div>
    </div>
    <div class="glass p-5 mb-6">
      <h2 class="font-bold text-lg mb-4" data-i18n="subjects_title">Предметы</h2>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3" id="subject-grid"></div>
    </div>
  </section>

  <section id="sec-quiz" style="display:none">
    <div class="max-w-2xl mx-auto">
      <div class="glass p-5 mb-4">
        <div class="flex justify-between mb-3">
          <span class="text-xs font-bold text-gold-grad" id="q-subject-label">ПРЕДМЕТ</span>
          <span class="text-xs" id="q-counter">1 / 10</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="q-progress" style="width:0%"></div></div>
      </div>
      <div class="glass-strong p-6 mb-4" id="q-card">
        <div id="q-text" class="text-xl font-bold mb-8"></div>
        <div id="q-options"></div>
      </div>
      <div id="q-feedback" class="glass p-5 mb-4" style="display:none">
        <div id="q-explanation" class="text-sm mb-3"></div>
        <div id="q-lifehack" class="text-sm p-3 rounded-xl bg-yellow-500/10 border border-yellow-500/20 text-yellow-200"></div>
        <button class="btn-gold mt-4 w-full" onclick="nextQuestion()" data-i18n="quiz_next">Далее</button>
      </div>
    </div>
  </section>

  <section id="sec-leaderboard" style="display:none">
    <div class="max-w-2xl mx-auto">
      <h2 class="text-2xl font-black mb-6" data-i18n="lb_title">Рейтинг</h2>
      <div class="glass p-5" id="lb-list"></div>
    </div>
  </section>

  <section id="sec-stats" style="display:none">
    <div class="max-w-4xl mx-auto">
      <h2 class="text-2xl font-black mb-6" data-i18n="stats_title">Статистика</h2>
      <div class="grid sm:grid-cols-2 gap-6">
        <div class="glass p-5" style="height:350px"><canvas id="radar-chart"></canvas></div>
        <div class="glass p-5">
           <h3 class="font-bold mb-4" data-i18n="personal_stats">Показатели</h3>
           <div id="personal-stats-content" class="space-y-4"></div>
        </div>
      </div>
    </div>
  </section>

  <section id="sec-admin" style="display:none">
    <div class="max-w-2xl mx-auto glass p-8">
      <h2 class="text-2xl font-black mb-6">Admin Panel</h2>
      <div class="space-y-4">
        <input class="inp" id="adm-id" placeholder="ID (math_01)">
        <select class="inp" id="adm-subject">
          <option value="math">Математика</option>
          <option value="history">История</option>
        </select>
        <textarea class="inp" id="adm-text-ru" placeholder="Вопрос RU"></textarea>
        <textarea class="inp" id="adm-text-kk" placeholder="Сұрақ KK"></textarea>
        <input class="inp" id="adm-opts-ru" placeholder="A|B|C|D (RU)">
        <input class="inp" id="adm-opts-kk" placeholder="A|B|C|D (KK)">
        <input class="inp" id="adm-correct" type="number" placeholder="Индекс верного (0-3)">
        <button class="btn-gold w-full" onclick="adminAddQuestion()">Добавить в облако</button>
      </div>
    </div>
  </section>
</main>

<div class="modal-backdrop" id="modal-auth">
  <div class="modal-box text-center">
    <button class="modal-close" onclick="closeModal('modal-auth')"><i class="fas fa-times"></i></button>
    <h2 class="text-2xl font-black mb-6 text-gold-grad" data-i18n="auth_title">Вход</h2>
    <div class="space-y-4">
      <input class="inp" id="login-email" type="email" placeholder="Email">
      <input class="inp" id="login-password" type="password" placeholder="Пароль">
      <button class="btn-gold w-full" onclick="handleLogin()">Войти</button>
      <button class="btn-ghost w-full" onclick="handleRegister()">Зарегистрироваться</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-subjects">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-subjects')"><i class="fas fa-times"></i></button>
    <h2 class="text-xl font-black mb-6" data-i18n="subj_title">Выберите предмет</h2>
    <div class="grid grid-cols-2 gap-3" id="modal-subject-grid"></div>
  </div>
</div>

<div class="modal-backdrop" id="modal-academy">
  <div class="modal-box text-center">
    <button class="modal-close" onclick="closeModal('modal-academy')"><i class="fas fa-times"></i></button>
    <h2 class="text-2xl font-black mb-4">Академия</h2>
    <p class="text-muted mb-6">Курсы и материалы появятся в PRO версии.</p>
    <button class="btn-gold w-full" onclick="closeModal('modal-academy')">Понятно</button>
  </div>
</div>

<div class="modal-backdrop" id="modal-results">
  <div class="modal-box text-center">
    <h2 class="text-4xl font-black mb-2">🎉</h2>
    <h2 class="text-2xl font-black mb-2" data-i18n="res_title">Результат</h2>
    <div class="text-5xl font-black text-gold-grad mb-6" id="res-score">0/10</div>
    <div id="res-hacks" class="text-left mb-6 space-y-2"></div>
    <button class="btn-gold w-full" onclick="closeModal('modal-results'); showSection('home')">На главную</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// СИСТЕМА УПРАВЛЕНИЯ ALTYN LOGIC (Titan Stable 8.2.1)
// ═══════════════════════════════════════════════════════════════════════════

const SUPABASE_URL = 'https://ixjowqkwcgkksatgkmqd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JGImt2KS6mStnbnAcJcEPg_8qbal1zc';
const ADMIN_EMAILS = ['khamidullinalibek90@gmail.com', 'alibek90@mail.ru'];

const I18N = {
  ru: {
    nav_home:'Главная', nav_quiz:'Тест', nav_stats:'Статистика', nav_lb:'Рейтинг', nav_admin:'Админ',
    hero_sub:'Интерактивные тесты и аналитика ҰБТ 2026', hero_start:'Начать тест', hero_academy:'Академия',
    stat_q:'Вопросов', stat_elo:'ELO', subjects_title:'Предметы', quiz_next:'Далее',
    stats_title:'Аналитика навыков', personal_stats:'Показатели', lb_title:'Топ учеников',
    auth_title:'Авторизация', login_text:'Вход', subj_title:'Выберите предмет', res_title:'Тест завершен'
  },
  kk: {
    nav_home:'Басты бет', nav_quiz:'Тест', nav_stats:'Статистика', nav_lb:'Рейтинг', nav_admin:'Админ',
    hero_sub:'ҰБТ 2026 интерактивті тесттері мен аналитикасы', hero_start:'Тестті бастау', hero_academy:'Академия',
    stat_q:'Сұрақтар', stat_elo:'ELO', subjects_title:'Пәндер', quiz_next:'Келесі',
    stats_title:'Дағдылар аналитикасы', personal_stats:'Көрсеткіштер', lb_title:'Үздік оқушылар',
    auth_title:'Авторизация', login_text:'Кіру', subj_title:'Пәнді таңдаңыз', res_title:'Тест аяқталды'
  }
};

const SUBJECTS = {
  math: { icon:'fas fa-calculator', color:'#6366F1', ru:'Математика', kk:'Математика' },
  history: { icon:'fas fa-landmark', color:'#F59E0B', ru:'История Казахстана', kk:'Қазақстан тарихы' },
  physics: { icon:'fas fa-atom', color:'#06B6D4', ru:'Физика', kk:'Физика' },
  kazakh: { icon:'fas fa-language', color:'#EC4899', ru:'Казахский язык', kk:'Қазақ тілі' }
};

const appState = {
  lang: localStorage.getItem('lang') || 'ru',
  user: null, profile: { elo: 800, streak: 0 },
  questions: [],
  session: { questions: [], index: 0, correct: 0, wrongQuestions: [], subject: 'all' },
  skills: { math: 70, history: 70, physics: 70, kazakh: 70 }
};

let supabase = null;

async function init() {
  updateI18N();
  renderSubjectGrids();
  try {
    if (window.supabase) supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  } catch(e) {}
  await loadQuestions();
  if (supabase) checkAuth();
  updateAuthArea();
}

async function loadQuestions() {
  let combined = (typeof LOCAL_QUESTIONS !== 'undefined') ? [...LOCAL_QUESTIONS] : [];
  if (supabase) {
    try {
      const { data } = await supabase.from('questions').select('*');
      if (data) {
        const map = new Map();
        combined.forEach(q => map.set(q.id, q));
        data.forEach(q => map.set(q.id, q));
        combined = [...map.values()];
      }
    } catch(e) {}
  }
  appState.questions = combined;
  document.getElementById('stat-questions').textContent = combined.length;
}

function checkAuth() {
  supabase.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      appState.user = session.user;
      const { data } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
      if (data) {
        appState.profile = data;
        if (data.skills) appState.skills = data.skills;
      }
      updateAuthArea();
      updateAdminVisibility();
      closeModal('modal-auth');
    }
  });
}

async function handleLogin() {
  const e = document.getElementById('login-email').value;
  const p = document.getElementById('login-password').value;
  const { error } = await supabase.auth.signInWithPassword({ email: e, password: p });
  if (error) alert("Ошибка входа");
}

async function handleRegister() {
  const e = document.getElementById('login-email').value;
  const p = document.getElementById('login-password').value;
  const { data, error } = await supabase.auth.signUp({ email: e, password: p });
  if (error) alert("Ошибка регистрации");
  else if (data.user) {
     await supabase.from('profiles').upsert({ id: data.user.id, email: e, elo: 800 });
     alert("Регистрация успешна! Теперь войдите.");
  }
}

function showSection(name) {
  ['home', 'quiz', 'stats', 'leaderboard', 'admin'].forEach(s => {
    const el = document.getElementById('sec-' + s);
    if (el) el.style.display = (s === name) ? 'block' : 'none';
    const navEl = document.getElementById('nav-' + s);
    if (navEl) navEl.classList.toggle('active', s === name);
  });
  if (name === 'leaderboard') loadLeaderboard();
  if (name === 'stats') { setTimeout(renderRadarChart, 100); updatePersonalStats(); }
}

function startQuiz(sub) {
  closeModal('modal-subjects');
  let pool = sub === 'all' ? appState.questions : appState.questions.filter(q => q.subject === sub);
  if (!pool.length) return alert("Вопросов нет");
  appState.session = { questions: pool.sort(() => 0.5 - Math.random()).slice(0, 10), index: 0, correct: 0, wrongQuestions: [], subject: sub };
  showSection('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = appState.session.questions[appState.session.index];
  const lang = appState.lang;
  document.getElementById('q-subject-label').textContent = SUBJECTS[q.subject]?.[lang] || q.subject;
  document.getElementById('q-counter').textContent = `${appState.session.index + 1} / ${appState.session.questions.length}`;
  document.getElementById('q-progress').style.width = `${((appState.session.index + 1) / appState.session.questions.length) * 100}%`;
  document.getElementById('q-text').innerHTML = q[`text_${lang}`] || q.text_ru;
  
  const opts = document.getElementById('q-options');
  opts.innerHTML = '';
  const arr = q[`options_${lang}`] || q.options_ru;
  arr.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="text-gold font-bold mr-2">${['A','B','C','D'][i]}.</span> ${o}`;
    btn.onclick = () => {
      if (appState.session.answered) return;
      appState.session.answered = true;
      const btns = opts.querySelectorAll('.option-btn');
      if (i === q.correct) {
        btn.classList.add('correct'); appState.session.correct++;
      } else {
        btn.classList.add('wrong'); btns[q.correct].classList.add('correct');
        appState.session.wrongQuestions.push(q);
      }
      document.getElementById('q-feedback').style.display = 'block';
      document.getElementById('q-explanation').innerHTML = q[`explanation_${lang}`] || q.explanation_ru;
      document.getElementById('q-lifehack').innerHTML = q[`lifehack_${lang}`] || q.lifehack_ru || "Просто повтори тему";
    };
    opts.appendChild(btn);
  });
  appState.session.answered = false;
  document.getElementById('q-feedback').style.display = 'none';
  if (window.MathJax) MathJax.typeset();
}

function nextQuestion() {
  appState.session.index++;
  if (appState.session.index < appState.session.questions.length) renderQuestion();
  else finishQuiz();
}

async function finishQuiz() {
  const eloGain = appState.session.correct * 10;
  appState.profile.elo += eloGain;
  if (supabase && appState.user) {
    await supabase.from('profiles').upsert({ id: appState.user.id, elo: appState.profile.elo });
  }
  document.getElementById('res-score').textContent = `${appState.session.correct} / ${appState.session.questions.length}`;
  const hacks = document.getElementById('res-hacks');
  hacks.innerHTML = appState.session.wrongQuestions.map(q => `<div class="p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-xs"><span class="text-red-400 font-bold">Совет:</span> ${q[`lifehack_${appState.lang}`] || q.lifehack_ru}</div>`).join('');
  openModal('modal-results');
}

async function loadLeaderboard() {
  const lb = document.getElementById('lb-list');
  lb.innerHTML = '<div class="spinner mx-auto"></div>';
  const { data } = await supabase.from('profiles').select('email, elo').order('elo', {ascending:false}).limit(5);
  if (data) {
    lb.innerHTML = data.map((u, i) => `<div class="flex justify-between items-center p-3 border-b border-white/5"><span>${i+1}. ${u.email.split('@')[0]}</span><span class="elo-badge">${u.elo}</span></div>`).join('');
  }
}

function renderRadarChart() {
  const ctx = document.getElementById('radar-chart');
  if (appState.radarChart) appState.radarChart.destroy();
  appState.radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['Мат', 'Ист', 'Физ', 'Каз'],
      datasets: [{ data: Object.values(appState.skills), backgroundColor: 'rgba(245,197,66,0.1)', borderColor: '#F5C542', borderWidth: 2 }]
    },
    options: { scales: { r: { min:0, max:100, grid:{color:'rgba(255,255,255,0.05)'}, ticks:{display:false} } }, plugins:{legend:{display:false}} }
  });
}

function updateI18N() {
  const lang = appState.lang;
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = I18N[lang][el.getAttribute('data-i18n')]);
  document.getElementById('lang-toggle').textContent = lang === 'ru' ? 'KK' : 'RU';
}

function toggleLang() {
  appState.lang = appState.lang === 'ru' ? 'kk' : 'ru';
  localStorage.setItem('lang', appState.lang);
  updateI18N(); renderSubjectGrids();
}

function renderSubjectGrids() {
  const lang = appState.lang;
  const html = Object.entries(SUBJECTS).map(([k, s]) => `<div class="subj-card" onclick="startQuiz('${k}')"><i class="${s.icon} text-xl mb-2" style="color:${s.color}"></i><div class="text-xs font-bold">${s[lang]}</div></div>`).join('');
  document.getElementById('subject-grid').innerHTML = html;
  document.getElementById('modal-subject-grid').innerHTML = html;
}

function updateAuthArea() {
  const el = document.getElementById('auth-area');
  if (appState.user) {
    el.innerHTML = `<div class="flex items-center gap-2"><div class="elo-badge">${appState.profile.elo}</div><button class="btn-ghost p-2" onclick="supabase.auth.signOut(); location.reload();"><i class="fas fa-sign-out-alt"></i></button></div>`;
  } else {
    el.innerHTML = `<button class="btn-gold py-1 px-4 text-xs" onclick="openModal('modal-auth')">${I18N[appState.lang].login_text}</button>`;
  }
}

function updateAdminVisibility() {
  const show = appState.user && ADMIN_EMAILS.includes(appState.user.email);
  document.getElementById('nav-admin').style.display = show ? 'block' : 'none';
}

function updatePersonalStats() {
  document.getElementById('personal-stats-content').innerHTML = `<div class="flex justify-between"><span>ELO:</span><span class="text-gold font-bold">${appState.profile.elo}</span></div>`;
}

window.showSection = showSection; window.startQuiz = startQuiz; window.nextQuestion = nextQuestion;
window.toggleLang = toggleLang; window.openModal = (id) => document.getElementById(id).classList.add('active');
window.closeModal = (id) => document.getElementById(id).classList.remove('active');
window.openSubjectsModal = () => window.openModal('modal-subjects');
window.handleLogin = handleLogin; window.handleRegister = handleRegister;

init();
</script>
</body>
</html>
